<h1> ACE NOTES LIBRARY</h1>
      <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ACE Notes Library</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
        min-height:100vh;
        color:white;
        padding:30px;
    }

    h1{
        text-align:center;
        font-size:42px;
        margin-bottom:10px;
        color:#38bdf8;
        text-shadow:0 0 15px rgba(56,189,248,0.7);
    }

    .subtitle{
        text-align:center;
        margin-bottom:35px;
        color:#cbd5e1;
        font-size:18px;
    }

    .container{
        max-width:1200px;
        margin:auto;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.1);
        border-radius:20px;
        padding:30px;
        backdrop-filter:blur(10px);
        box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .section-title{
        margin-top:25px;
        margin-bottom:15px;
        color:#facc15;
        font-size:28px;
        border-left:6px solid #facc15;
        padding-left:12px;
    }

    .form-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
        margin-bottom:25px;
    }

    input{
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        background:#1e293b;
        color:white;
        font-size:16px;
        outline:none;
        border:2px solid transparent;
        transition:0.3s;
    }

    input:focus{
        border-color:#38bdf8;
        box-shadow:0 0 10px rgba(56,189,248,0.5);
    }

    .subjects{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
        gap:15px;
        margin-top:20px;
    }

    .subject-option{
        background:#0f172a;
        border:2px solid #334155;
        padding:15px;
        border-radius:14px;
        cursor:pointer;
        transition:0.3s;
        text-align:center;
        font-weight:bold;
        color:#e2e8f0;
    }

    .subject-option:hover{
        transform:translateY(-4px);
        border-color:#38bdf8;
        background:#1e293b;
    }

    .subject-option input{
        display:none;
    }

    .subject-option.active{
        background:linear-gradient(135deg,#2563eb,#38bdf8);
        color:white;
        border-color:#38bdf8;
        box-shadow:0 0 20px rgba(56,189,248,0.5);
    }

    .btn{
        margin-top:30px;
        width:100%;
        padding:16px;
        border:none;
        border-radius:14px;
        background:linear-gradient(135deg,#22c55e,#16a34a);
        color:white;
        font-size:18px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    .btn:hover{
        transform:scale(1.02);
        box-shadow:0 0 20px rgba(34,197,94,0.5);
    }

    #subjectsDisplay{
        margin-top:40px;
    }

    .subject-card{
        margin-bottom:35px;
        background:#111827;
        border-radius:18px;
        padding:25px;
        border:1px solid rgba(255,255,255,0.08);
    }

    .subject-name{
        font-size:28px;
        margin-bottom:20px;
        color:#38bdf8;
        text-transform:uppercase;
        border-bottom:2px solid #334155;
        padding-bottom:10px;
    }

    .years-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
        gap:15px;
    }

    .year-tab{
        text-decoration:none;
        background:linear-gradient(135deg,#7c3aed,#9333ea);
        color:white;
        padding:14px;
        border-radius:12px;
        text-align:center;
        font-weight:bold;
        transition:0.3s;
        border:2px solid transparent;
    }

    .year-tab:hover{
        transform:translateY(-5px);
        border-color:#c084fc;
        box-shadow:0 0 15px rgba(192,132,252,0.5);
    }

    @media(max-width:700px){
        h1{
            font-size:32px;
        }

        .section-title{
            font-size:22px;
        }
    }
</style>
</head>

<body>

<h1>ACE NOTES LIBRARY</h1>
<p class="subtitle">
Professional KCSE Revision Portal
</p>

<div class="container">

    <h2 class="section-title">Student Information</h2>

    <div class="form-grid">
        <input type="text" id="name" placeholder="Enter Full Name">
        <input type="email" id="email" placeholder="Enter Email Address">
        <input type="tel" id="phone" placeholder="Enter Phone Number">
    </div>

    <h2 class="section-title">Select Subjects</h2>

    <div class="subjects" id="subjectsList">

        <label class="subject-option">
            <input type="checkbox" value="MATHEMATICS">
            MATHEMATICS
        </label>

        <label class="subject-option">
            <input type="checkbox" value="ENGLISH">
            ENGLISH
        </label>

        <label class="subject-option">
            <input type="checkbox" value="KISWAHILI">
            KISWAHILI
        </label>

        <label class="subject-option">
            <input type="checkbox" value="BIOLOGY">
            BIOLOGY
        </label>

        <label class="subject-option">
            <input type="checkbox" value="CHEMISTRY">
            CHEMISTRY
        </label>

        <label class="subject-option">
            <input type="checkbox" value="PHYSICS">
            PHYSICS
        </label>

        <label class="subject-option">
            <input type="checkbox" value="HISTORY">
            HISTORY
        </label>

        <label class="subject-option">
            <input type="checkbox" value="CRE">
            CRE
        </label>

        <label class="subject-option">
            <input type="checkbox" value="BUSINESS">
            BUSINESS
        </label>

        <label class="subject-option">
            <input type="checkbox" value="COMPUTER STUDIES">
            COMPUTER STUDIES
        </label>

        <label class="subject-option">
            <input type="checkbox" value="GEOGRAPHY">
            GEOGRAPHY
        </label>

        <label class="subject-option">
            <input type="checkbox" value="AGRICULTURE">
            AGRICULTURE
        </label>

    </div>

    <button class="btn" onclick="generateSubjects()">
        OPEN SUBJECT PORTAL
    </button>

    <div id="subjectsDisplay"></div>

</div>

<script>

    // Highlight selected subjects
    const subjectOptions = document.querySelectorAll('.subject-option');

    subjectOptions.forEach(option => {
        option.addEventListener('click', () => {
            option.classList.toggle('active');
        });
    });

    function generateSubjects(){

        const selectedSubjects = [];

        document.querySelectorAll('.subject-option input:checked')
        .forEach(subject => {
            selectedSubjects.push(subject.value);
        });

        const display = document.getElementById('subjectsDisplay');

        display.innerHTML = '';

        if(selectedSubjects.length === 0){
            alert("Please select at least one subject.");
            return;
        }

        selectedSubjects.forEach(subject => {

            let yearsHTML = '';

            for(let year = 2000; year <= 2027; year++){

                yearsHTML += `
                    <a href="#" class="year-tab">
                        KCSE ${year}
                    </a>
                `;
            }

            display.innerHTML += `
                <div class="subject-card">

                    <div class="subject-name">
                        ${subject}
                    </div>

                    <div class="years-grid">
                        ${yearsHTML}
                    </div>

                </div>
            `;

        });

    }

</script>

</body>
</html>
