<h1> ACE NOTES LIBRARY</h1>
      <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE NOTES LIBRARY</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.main-title{
    text-align:center;
    font-size:45px;
    color:#38bdf8;
    margin-bottom:10px;
    text-shadow:0 0 15px rgba(56,189,248,0.6);
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:40px;
    font-size:18px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:30px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

.section-title{
    color:#facc15;
    font-size:28px;
    margin-bottom:20px;
    border-left:6px solid #facc15;
    padding-left:12px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
    border:2px solid transparent;
    transition:0.3s;
}

input:focus{
    border-color:#38bdf8;
    box-shadow:0 0 12px rgba(56,189,248,0.4);
}

.subjects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.subject-box{
    background:#0f172a;
    padding:16px;
    border-radius:14px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    border:2px solid #334155;
    font-weight:bold;
}

.subject-box:hover{
    transform:translateY(-5px);
    border-color:#38bdf8;
}

.subject-box.active{
    background:linear-gradient(135deg,#2563eb,#38bdf8);
    border-color:#38bdf8;
    box-shadow:0 0 18px rgba(56,189,248,0.5);
}

.subject-box input{
    display:none;
}

.btn{
    width:100%;
    padding:17px;
    margin-top:30px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.02);
    box-shadow:0 0 18px rgba(34,197,94,0.5);
}

.notice{
    margin-top:25px;
    background:#14532d;
    color:#bbf7d0;
    padding:18px;
    border-radius:14px;
    font-size:18px;
    text-align:center;
    display:none;
}

.subject-tabs{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.subject-tab{
    background:linear-gradient(135deg,#7c3aed,#9333ea);
    padding:25px;
    border-radius:18px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    font-size:22px;
    font-weight:bold;
    border:2px solid transparent;
}

.subject-tab:hover{
    transform:translateY(-6px);
    border-color:#d8b4fe;
    box-shadow:0 0 20px rgba(216,180,254,0.5);
}

.years-section{
    margin-top:40px;
}

.years-title{
    color:#38bdf8;
    font-size:32px;
    margin-bottom:20px;
    text-transform:uppercase;
}

.years-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.year-link{
    text-decoration:none;
    background:linear-gradient(135deg,#ea580c,#f97316);
    color:white;
    padding:15px;
    border-radius:14px;
    text-align:center;
    font-weight:bold;
    transition:0.3s;
    border:2px solid transparent;
}

.year-link:hover{
    transform:translateY(-4px);
    border-color:#fdba74;
    box-shadow:0 0 18px rgba(249,115,22,0.5);
}

@media(max-width:700px){

    .main-title{
        font-size:32px;
    }

    .section-title{
        font-size:22px;
    }

}

</style>
</head>

<body>

<div class="container">

    <h1 class="main-title">ACE NOTES LIBRARY</h1>

    <p class="subtitle">
        KCSE Revision and Past Papers Portal
    </p>

    <div class="card" id="registrationCard">

        <h2 class="section-title">Learner Information</h2>

        <div class="form-grid">

            <input type="text" id="name" placeholder="Enter Full Name">

            <input type="email" id="email" placeholder="Enter Email Address">

            <input type="tel" id="phone" placeholder="Enter Phone Number">

        </div>

        <h2 class="section-title">Select Subjects</h2>

        <div class="subjects">

            <label class="subject-box">
                <input type="checkbox" value="MATHEMATICS">
                MATHEMATICS
            </label>

            <label class="subject-box">
                <input type="checkbox" value="ENGLISH">
                ENGLISH
            </label>

            <label class="subject-box">
                <input type="checkbox" value="KISWAHILI">
                KISWAHILI
            </label>

            <label class="subject-box">
                <input type="checkbox" value="BIOLOGY">
                BIOLOGY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="CHEMISTRY">
                CHEMISTRY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="PHYSICS">
                PHYSICS
            </label>

            <label class="subject-box">
                <input type="checkbox" value="HISTORY">
                HISTORY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="CRE">
                CRE
            </label>

            <label class="subject-box">
                <input type="checkbox" value="BUSINESS">
                BUSINESS
            </label>

            <label class="subject-box">
                <input type="checkbox" value="COMPUTER STUDIES">
                COMPUTER STUDIES
            </label>

            <label class="subject-box">
                <input type="checkbox" value="GEOGRAPHY">
                GEOGRAPHY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="AGRICULTURE">
                AGRICULTURE
            </label>

        </div>

        <button class="btn" onclick="goToSubjects()">
            CONTINUE TO SUBJECTS
        </button>

        <div class="notice" id="noticeBox">
            Login information sent to the instructor successfully.
        </div>

    </div>

    <div id="subjectsArea"></div>

    <div id="yearsArea"></div>

</div>

<script>

const subjectBoxes = document.querySelectorAll('.subject-box');

subjectBoxes.forEach(box => {

    box.addEventListener('click', () => {

        box.classList.toggle('active');

    });

});

function goToSubjects(){

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;

    if(name === "" || email === "" || phone === ""){
        alert("Please fill all personal information.");
        return;
    }

    const selectedSubjects = [];

    document.querySelectorAll('.subject-box input:checked')
    .forEach(subject => {
        selectedSubjects.push(subject.value);
    });

    if(selectedSubjects.length === 0){
        alert("Please select at least one subject.");
        return;
    }

    // Hide personal information section
    document.querySelector('.form-grid').style.display = "none";
    document.querySelector('.subjects').style.display = "none";
    document.querySelector('.btn').style.display = "none";

    // Show instructor notice
    document.getElementById('noticeBox').style.display = "block";

    // Display selected subjects
    const subjectsArea = document.getElementById('subjectsArea');

    subjectsArea.innerHTML = `
        <h2 class="section-title" style="margin-top:40px;">
            Your Selected Subjects
        </h2>

        <div class="subject-tabs">
            ${selectedSubjects.map(subject => `
                <div class="subject-tab"
                     onclick="openYears('${subject}')">
                     ${subject}
                </div>
            `).join('')}
        </div>
    `;

}

function openYears(subject){

    const yearsArea = document.getElementById('yearsArea');

    let yearsHTML = '';

    for(let year = 2000; year <= 2027; year++){

        yearsHTML += `
            <a href="#" class="year-link">
                KCSE ${year}
            </a>
        `;

    }

    yearsArea.innerHTML = `

        <div class="years-section">

            <div class="years-title">
                ${subject} Past Papers
            </div>

            <div class="years-grid">
                ${yearsHTML}
            </div>

        </div>

    `;

}

</script>

</body>
                  </html>
