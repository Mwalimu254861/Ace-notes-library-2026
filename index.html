<!DOCTYPE html>
<html>
<head>
    <title>KCSE PAST PAPERS DASHBOARD</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        h1 {
            font-size: 70px;
            margin-top: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 40px;
        }

        .tab {
            width: 320px;
            padding: 35px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-size: 35px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .tab:hover {
            transform: scale(1.08);
            opacity: 0.9;
        }

        /* SUBJECT COLORS */
        .math { background: linear-gradient(45deg,#ff5722,#ff9800); }
        .english { background: linear-gradient(45deg,#f44336,#e91e63); }
        .kiswahili { background: linear-gradient(45deg,#ff9800,#ffc107); }
        .biology { background: linear-gradient(45deg,#4caf50,#8bc34a); }
        .chemistry { background: linear-gradient(45deg,#9c27b0,#673ab7); }
        .physics { background: linear-gradient(45deg,#2196f3,#00bcd4); }
        .history { background: linear-gradient(45deg,#795548,#607d8b); }
        .cre { background: linear-gradient(45deg,#3f51b5,#2196f3); }
        .business { background: linear-gradient(45deg,#ff9800,#e91e63); }
        .computer { background: linear-gradient(45deg,#00c853,#2196f3); }

    </style>
</head>

<body>

    <a class="tab history" href="history/">HISTORY</a>
    <a class="tab cre" href="cre/">CRE</a>

    <a class="tab computer" href="computer-studies/">COMPUTER STUDIES</a>
