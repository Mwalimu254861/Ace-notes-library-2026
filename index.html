}

// STEP 2: WHEN YEAR IS CLICKED → SHOW PAPER 1 & 2
function showPapers(year) {
  const yearsArea = document.getElementById("yearsArea");

  let html = `
    <h2>KCSE ${year}</h2>
    <p>Select Paper</p>
    <div class="paper-grid">
  `;

  kcseData[year].forEach(paper => {
    html += `
      <button class="paper-btn" onclick="openPaper(${year}, '${paper}')">
        ${paper}
      </button>
    `;
  });

  html += `</div>`;

  yearsArea.innerHTML = html;
}

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE NOTES LIBRARY</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    color:white;
    padding:30px;
}

/* MAIN CONTAINER */

.container{
    max-width:1200px;
    margin:auto;
}

/* TITLES */

.main-title{
    text-align:center;
    font-size:45px;
    color:#38bdf8;
    margin-bottom:10px;
    text-shadow:0 0 15px rgba(56,189,248,0.6);
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:40px;
    font-size:18px;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border-radius:22px;
    padding:30px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

/* SECTION TITLE */

.section-title{
    color:#facc15;
    font-size:28px;
    margin-bottom:20px;
    border-left:6px solid #facc15;
    padding-left:12px;
}

/* INPUTS */

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
    border:2px solid transparent;
    transition:0.3s;
}

input:focus{
    border-color:#38bdf8;
    box-shadow:0 0 12px rgba(56,189,248,0.4);
}

/* SUBJECTS */

.subjects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.subject-box{
    background:#0f172a;
    padding:18px;
    border-radius:16px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    border:2px solid #334155;
    font-weight:bold;
    position:relative;
    overflow:hidden;
}

.subject-box:hover{
    transform:translateY(-5px);
    border-color:#38bdf8;
}

/* ACTIVE SUBJECT */

.subject-box.active{
    background:linear-gradient(135deg,#2563eb,#38bdf8);
    border-color:#38bdf8;
    color:white;
    box-shadow:0 0 20px rgba(56,189,248,0.5);
}

.subject-box input{
    display:none;
}

/* TICK */

.tick{
    position:absolute;
    top:10px;
    right:10px;
    width:25px;
    height:25px;
    border-radius:50%;
    background:white;
    color:#2563eb;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:15px;
    font-weight:bold;
    box-shadow:0 0 10px rgba(255,255,255,0.5);
}

.subject-box.active .tick{
    display:flex;
}

/* SUBJECT COUNT */

.selected-count{
    margin-top:20px;
    text-align:center;
    background:rgba(250,204,21,0.1);
    border:1px solid rgba(250,204,21,0.3);
    color:#facc15;
    padding:14px;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
}

/* BUTTON */

.btn{
    width:100%;
    margin-top:30px;
    padding:17px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.02);
    box-shadow:0 0 18px rgba(34,197,94,0.5);
}

/* NOTICE */

.notice{
    margin-top:25px;
    background:#14532d;
    color:#bbf7d0;
    padding:18px;
    border-radius:14px;
    text-align:center;
    font-size:18px;
    display:none;
}

/* SUBJECT DASHBOARD */

.dashboard{
    margin-top:40px;
}

.subject-dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.subject-tab{
    background:linear-gradient(135deg,#7c3aed,#9333ea);
    padding:25px;
    border-radius:18px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    font-size:22px;
    font-weight:bold;
    border:2px solid transparent;
}

.subject-tab:hover{
    transform:translateY(-6px);
    border-color:#d8b4fe;
    box-shadow:0 0 20px rgba(216,180,254,0.5);
}

/* YEARS */

.years-section{
    margin-top:40px;
}

.years-title{
    font-size:32px;
    color:#38bdf8;
    margin-bottom:20px;
    text-transform:uppercase;
}

.years-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.year-tab{
    background:linear-gradient(135deg,#ea580c,#f97316);
    padding:16px;
    border-radius:14px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
    text-decoration:none;
    color:white;
}

.year-tab:hover{
    transform:translateY(-4px);
    border-color:#fdba74;
    box-shadow:0 0 18px rgba(249,115,22,0.5);
}

/* MOBILE */

@media(max-width:700px){

    .main-title{
        font-size:32px;
    }

    .section-title{
        font-size:22px;
    }

}

</style>
</head>

<body>

<div class="container">

    <h1 class="main-title">ACE NOTES LIBRARY</h1>

    <p class="subtitle">
        KCSE Revision and Past Papers Portal
    </p>

    <!-- REGISTRATION CARD -->

    <div class="card" id="registrationCard">

        <h2 class="section-title">
            Learner Information
        </h2>

        <div class="form-grid">

            <input type="text" id="name" placeholder="Enter Full Name">

            <input type="email" id="email" placeholder="Enter Email Address">

            <input type="tel" id="phone" placeholder="Enter Phone Number">

        </div>

        <h2 class="section-title">
            Select Subjects
        </h2>

        <div class="subjects">

            <label class="subject-box">
                <input type="checkbox" value="MATHEMATICS">
                <span class="tick">✓</span>
                MATHEMATICS
            </label>

            <label class="subject-box">
                <input type="checkbox" value="ENGLISH">
                <span class="tick">✓</span>
                 ENGLISH
            </label>

            <label class="subject-box">
                <input type="checkbox" value="KISWAHILI">
                <span class="tick">✓</span>
                KISWAHILI
            </label>

            <label class="subject-box">
                <input type="checkbox" value="BIOLOGY">
                <span class="tick">✓</span>
                BIOLOGY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="CHEMISTRY">
                <span class="tick">✓</span>
                CHEMISTRY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="PHYSICS">
                <span class="tick">✓</span>
                PHYSICS
            </label>

            <label class="subject-box">
                <input type="checkbox" value="HISTORY">
                <span class="tick">✓</span>
                HISTORY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="CRE">
                <span class="tick">✓</span>
                CRE
            </label>

            <label class="subject-box">
                <input type="checkbox" value="BUSINESS">
                <span class="tick">✓</span>
                BUSINESS
            </label>

            <label class="subject-box">
                <input type="checkbox" value="COMPUTER STUDIES">
                <span class="tick">✓</span>
                COMPUTER STUDIES
            </label>

            <label class="subject-box">
                <input type="checkbox" value="GEOGRAPHY">
                <span class="tick">✓</span>
                GEOGRAPHY
            </label>

            <label class="subject-box">
                <input type="checkbox" value="AGRICULTURE">
                <span class="tick">✓</span>
                AGRICULTURE
            </label>

        </div>

        <div class="selected-count" id="selectedCount">
            Selected Subjects: 0
        </div>

        <button class="btn" onclick="continuePortal()">
            CONTINUE TO DASHBOARD
        </button>

        <div class="notice" id="noticeBox">
            Information sent to instructor successfully.
        </div>

    </div>

    <!-- SUBJECT DASHBOARD -->

    <div id="dashboardArea"></div>

    <!-- YEARS SECTION -->

    <div id="yearsArea"></div>

</div>

<script>

/* SUBJECT SELECTION */

const subjectBoxes = document.querySelectorAll('.subject-box');
const selectedCount = document.getElementById('selectedCount');

subjectBoxes.forEach(box => {

    box.addEventListener('click', () => {

        box.classList.toggle('active');

        const checkbox = box.querySelector('input');

        checkbox.checked = !checkbox.checked;

        updateSelectedCount();

    });

});

/* UPDATE COUNT */

function updateSelectedCount(){

    const totalSelected =
    document.querySelectorAll('.subject-box input:checked').length;

    selectedCount.innerHTML =
    `Selected Subjects: ${totalSelected}`;

}

/* CONTINUE */

function continuePortal(){

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;

    if(name === "" || email === "" || phone === ""){

        alert("Please fill all learner information.");

        return;

    }

    const selectedSubjects = [];

    document.querySelectorAll('.subject-box input:checked')
    .forEach(subject => {

        selectedSubjects.push(subject.value);

    });

    if(selectedSubjects.length === 0){

        alert("Please select at least one subject.");

        return;

    }

    /* HIDE INPUT SECTION */

    document.querySelector('.form-grid').style.display = "none";
    document.querySelector('.subjects').style.display = "none";
    document.querySelector('.selected-count').style.display = "none";
    document.querySelector('.btn').style.display = "none";

    /* SHOW NOTICE */

    document.getElementById('noticeBox').style.display = "block";

    /* OPEN DASHBOARD */

    const dashboardArea = document.getElementById('dashboardArea');

    dashboardArea.innerHTML = `

        <div class="dashboard">

            <h2 class="section-title">
                Student Dashboard
            </h2>

            <div class="subject-dashboard">

                ${selectedSubjects.map(subject => `

                    <div class="subject-tab"
                         onclick="openYears('${subject}')">

                         ${subject}

                    </div>

                `).join('')}

            </div>

        </div>

    `;

}

/* OPEN YEARS */

function openYears(subject){

    const yearsArea = document.getElementById('yearsArea');

    let yearsHTML = '';

    for(let year = 2000; year <= 2027; year++){

        yearsHTML += `

            <!-- 
            Replace # with your folder or PDF link later
            Example:
            href="mathematics/2000/"
            -->

            <a href="#"
               class="year-tab">

               KCSE ${year}

            </a>

        `;

    }

    yearsArea.innerHTML = `

        <div class="years-section">

            <div class="years-title">

                ${subject} Past Papers

            </div>

            <div class="years-grid">

                ${yearsHTML}

            </div>

        </div>

    `;

}

</script>

</body>
