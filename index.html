<h1> ACE NOTES LIBRARY</h1>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCSE Revision Hub - Complete System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        /* Registration Form */
        .registration-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
        }

        .registration-panel.hidden {
            display: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .subject-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subject-item input {
            width: auto;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Two column layout for main content */
        .two-columns {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* Upload Panel (Admin Only - Hidden by default) */
        .upload-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
            display: none;
        }

        .upload-panel.show {
            display: block;
        }

        .upload-panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        /* Years Grid */
        .years-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .subject-selector {
            margin-bottom: 20px;
        }

        .years-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        .year-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .year-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .year-card.has-pdf {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .year-number {
            font-size: 20px;
            font-weight: bold;
        }

        .pdf-badge {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.8;
        }

        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: none;
        }

        .year-card:hover .delete-btn {
            display: block;
        }

        /* PDF Viewer */
        .pdf-viewer {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .pdf-viewer iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
        }

        .welcome-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 KCSE Revision Hub - Complete System</h1>
            <p>Register, select subjects, and access past papers instantly!</p>
        </div>

        <!-- Student Registration Section -->
        <div id="registrationPanel" class="registration-panel">
            <h2>📝 Student Registration</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="0712345678">
                </div>
            </div>
            
            <label>Select Your Subjects:</label>
            <div class="subjects-grid" id="subjectsList"></div>
            
            <button onclick="registerStudent()">🚀 Register & Access Library</button>
            <div id="regMessage"></div>
        </div>

        <!-- Main Content (Shows after registration) -->
        <div id="mainContent" style="display: none;">
            <div class="welcome-badge" id="welcomeMessage"></div>
            
            <div class="two-columns">
                <!-- Admin Upload Panel (Hidden by default) -->
                <div id="uploadPanel" class="upload-panel">
                    <h2>📤 Admin Upload Panel</h2>
                    <div class="form-group">
                        <label>Select Subject</label>
                        <select id="subjectSelect">
                            <option value="MATHEMATICS">MATHEMATICS</option>
                            <option value="ENGLISH">ENGLISH</option>
                            <option value="KISWAHILI">KISWAHILI</option>
                            <option value="BIOLOGY">BIOLOGY</option>
                            <option value="CHEMISTRY">CHEMISTRY</option>
                            <option value="PHYSICS">PHYSICS</option>
                            <option value="HISTORY">HISTORY</option>
                            <option value="GEOGRAPHY">GEOGRAPHY</option>
                            <option value="CRE">CRE</option>
                            <option value="BUSINESS">BUSINESS</option>
                            <option value="COMPUTER STUDIES">COMPUTER STUDIES</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Select Year</label>
                        <select id="yearSelect"></select>
                    </div>

                    <div class="form-group">
                        <label>Choose PDF File</label>
                        <input type="file" id="pdfFile" accept=".pdf">
                    </div>

                    <button onclick="uploadPDF()">📥 Upload PDF</button>
                    <button onclick="exportDatabase()" style="background: #28a745; margin-top: 10px;">💾 Backup Database</button>
                    <button onclick="importDatabase()" style="background: #ffc107; color: #333; margin-top: 5px;">📂 Restore Backup</button>
                    <div id="uploadMessage" class="message"></div>
                </div>

                <!-- Years Grid & PDF Viewer -->
                <div class="years-panel">
                    <div class="subject-selector">
                        <label style="font-weight: bold;">📖 Select Subject to View (Your registered subjects):</label>
                        <select id="viewSubjectSelect" onchange="loadYears()"></select>
                    </div>

                    <h3>📅 KCSE Years (2000 - 2027)</h3>
                    <div id="yearsGrid" class="years-grid"></div>

                    <div id="pdfViewer" class="pdf-viewer" style="display: none;">
                        <h4>📄 Past Paper Preview</h4>
                        <iframe id="pdfFrame" src=""></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Login Button -->
    <button class="admin-toggle" onclick="showAdminPanel()">🔧 Admin Login</button>

    <script>
        // Admin password
        const ADMIN_PASSWORD = "admin123";
        
        // PDF Database
        let pdfDatabase = {};
        
        // Student data
        let currentStudent = null;

        // List of all subjects
        const ALL_SUBJECTS = ["MATHEMATICS", "ENGLISH", "KISWAHILI", "BIOLOGY", "CHEMISTRY", "PHYSICS", "HISTORY", "GEOGRAPHY", "CRE", "BUSINESS", "COMPUTER STUDIES"];

        // Initialize subject checkboxes
        function initSubjectCheckboxes() {
            const container = document.getElementById('subjectsList');
            container.innerHTML = '';
            ALL_SUBJECTS.forEach(subject => {
                const div = document.createElement('div');
                div.className = 'subject-item';
                div.innerHTML = `
                    <input type="checkbox" id="subj_${subject}" value="${subject}">
                    <label for="subj_${subject}">${subject}</label>
                `;
                container.appendChild(div);
            });
        }

        // Register student
        function registerStudent() {
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            // Get selected subjects
            const selectedSubjects = [];
            ALL_SUBJECTS.forEach(subject => {
                const checkbox = document.getElementById(`subj_${subject}`);
                if (checkbox && checkbox.checked) {
                    selectedSubjects.push(subject);
                }
            });
            
            // Validation
            if (!name || !email || !phone) {
                showRegMessage('Please fill in all fields!', 'error');
                return;
            }
            
            if (!email.includes('@')) {
                showRegMessage('Please enter a valid email!', 'error');
                return;
            }
            
            if (selectedSubjects.length === 0) {
                showRegMessage('Please select at least one subject!', 'error');
                return;
            }
            
            // Save student data
            currentStudent = {
                name: name,
                email: email,
                phone: phone,
                subjects: selectedSubjects,
                registeredAt: new Date().toISOString()
            };
            
            localStorage.setItem('kcse_student', JSON.stringify(currentStudent));
            
            // Show success and hide registration
            showRegMessage(`✅ Welcome ${name}! Redirecting to your dashboard...`, 'success');
            
            setTimeout(() => {
                document.getElementById('registrationPanel').classList.add('hidden');
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('welcomeMessage').innerHTML = `🎓 Welcome ${name}! Your subjects: ${selectedSubjects.join(', ')}`;
                
                // Populate subject dropdown with only selected subjects
                populateViewSubjects(selectedSubjects);
                loadYears();
            }, 1500);
        }
        
        function showRegMessage(msg, type) {
            const msgDiv = document.getElementById('regMessage');
            msgDiv.innerHTML = `<div class="success-message" style="background: ${type === 'error' ? '#f8d7da' : '#d4edda'}; color: ${type === 'error' ? '#721c24' : '#155724'};">${msg}</div>`;
            setTimeout(() => {
                msgDiv.innerHTML = '';
            }, 3000);
        }
        
        // Populate view subjects dropdown with only student's selected subjects
        function populateViewSubjects(subjects) {
            const select = document.getElementById('viewSubjectSelect');
            select.innerHTML = '';
            subjects.forEach(subject => {
                const option = document.createElement('option');
                option.value = subject;
                option.textContent = subject;
                select.appendChild(option);
            });
        }

        // PDF Database Functions
        function loadDatabase() {
            const saved = localStorage.getItem('kcse_pdfs');
            if (saved) {
                pdfDatabase = JSON.parse(saved);
            } else {
                ALL_SUBJECTS.forEach(subject => {
                    pdfDatabase[subject] = {};
                });
            }
        }

        function saveDatabase() {
            localStorage.setItem('kcse_pdfs', JSON.stringify(pdfDatabase));
        }

        function populateYears() {
            const yearSelect = document.getElementById('yearSelect');
            yearSelect.innerHTML = '';
            for (let year = 2000; year <= 2027; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            }
        }

        function uploadPDF() {
            const subject = document.getElementById('subjectSelect').value;
            const year = document.getElementById('yearSelect').value;
            const fileInput = document.getElementById('pdfFile');
            const messageDiv = document.getElementById('uploadMessage');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                showUploadMessage('Please select a PDF file!', 'error');
                return;
            }
            
            const file = fileInput.files[0];
            if (file.type !== 'application/pdf') {
                showUploadMessage('Please upload a valid PDF file!', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64PDF = e.target.result;
                
                if (!pdfDatabase[subject]) {
                    pdfDatabase[subject] = {};
                }
                pdfDatabase[subject][year] = base64PDF;
                saveDatabase();
                
                showUploadMessage(`✅ Successfully uploaded ${subject} ${year} past paper!`, 'success');
                fileInput.value = '';
                
                const viewSubject = document.getElementById('viewSubjectSelect').value;
                if (viewSubject === subject) {
                    loadYears();
                }
            };
            reader.readAsDataURL(file);
        }
        
        function showUploadMessage(msg, type) {
            const messageDiv = document.getElementById('uploadMessage');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }
        
        function loadYears() {
            const subject = document.getElementById('viewSubjectSelect').value;
            if (!subject) return;
            
            const yearsGrid = document.getElementById('yearsGrid');
            const pdfViewer = document.getElementById('pdfViewer');
            
            pdfViewer.style.display = 'none';
            yearsGrid.innerHTML = '';
            
            for (let year = 2000; year <= 2027; year++) {
                const hasPDF = pdfDatabase[subject] && pdfDatabase[subject][year];
                const yearCard = document.createElement('div');
                yearCard.className = 'year-card' + (hasPDF ? ' has-pdf' : '');
                yearCard.innerHTML = `
                    <div class="year-number">${year}</div>
                    ${hasPDF ? '<div class="pdf-badge">📄 PDF Available</div>' : '<div class="pdf-badge">❌ No PDF</div>'}
                    <button class="delete-btn" onclick="deletePDF('${subject}', ${year}, event)">✖</button>
                `;
                
                yearCard.onclick = (function(y) {
                    return function() {
